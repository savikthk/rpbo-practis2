name: Build

on:
  push:
    branches: [ main, master, zad-1, zad-2, zad-3, zad-4, zad-5, zad-6 ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Release]
        arch: [x64, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: ${{ matrix.arch == 'x64' && 'win64_msvc2019_64' || 'win64_msvc2019_arm64' }}
          cache: true

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A ${{ matrix.arch }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Install WiX Toolset v3
        if: matrix.arch == 'x64'
        run: choco install wixtoolset

      - name: Find VC++ Redist Merge Module
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $msm = Get-ChildItem "C:\Program Files (x86)\Common Files\Merge Modules" -Filter "Microsoft_VC143_CRT_x64.msm" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msm) {
            $msm = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -Filter "Microsoft_VC143_CRT_x64.msm" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $msm) {
            $msm = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Redist\MSVC" -Filter "Microsoft_VC143_CRT_x64.msm" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $msm) {
            Write-Error "VC++ Redist merge module not found"
            exit 1
          }
          Write-Host "Found MSM: $($msm.FullName)"
          echo "MSM_PATH=$($msm.FullName)" >> $env:GITHUB_ENV

      - name: Deploy Qt runtime
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $wdq = (Get-Command windeployqt.exe -ErrorAction SilentlyContinue).Source
          if (-not $wdq) {
            $wdq = (Get-ChildItem "$env:QT_ROOT_DIR\bin\windeployqt.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $wdq) { Write-Error "windeployqt.exe not found"; exit 1 }
          Write-Host "windeployqt: $wdq"
          New-Item -ItemType Directory -Path "build\qt_deploy" -Force | Out-Null
          & $wdq --no-translations --no-system-d3d-compiler --no-opengl-sw `
            --dir "build\qt_deploy" `
            "build\${{ matrix.build_type }}\rbpo-app.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Installer (MSI)
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $candle = (Get-Command "candle.exe" -ErrorAction SilentlyContinue).Source
          if (-not $candle) {
            $candle = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\candle.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $candle) { Write-Error "candle.exe not found"; exit 1 }
          $light = (Get-Command "light.exe" -ErrorAction SilentlyContinue).Source
          if (-not $light) {
            $light = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\light.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $light) { Write-Error "light.exe not found"; exit 1 }
          $heat = (Get-Command "heat.exe" -ErrorAction SilentlyContinue).Source
          if (-not $heat) {
            $heat = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\heat.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $heat) { Write-Error "heat.exe not found"; exit 1 }
          Write-Host "candle: $candle"
          Write-Host "light:  $light"
          Write-Host "heat:   $heat"

          # Harvest Qt deployed files into a generated WXS
          & $heat dir "build\qt_deploy" -gg -scom -sreg -sfrag -srd `
            -cg QtDeployFiles -dr INSTALLFOLDER `
            -var var.QtDeployDir `
            -o "installer\QtFiles.wxs"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Compile
          & $candle -arch x64 `
            -dSourceDir="build\${{ matrix.build_type }}" `
            -dVCRedistPath="$env:MSM_PATH" `
            -o "installer\Product.wixobj" "installer\Product.wxs"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & $candle -arch x64 `
            -dQtDeployDir="build\qt_deploy" `
            -o "installer\QtFiles.wixobj" "installer\QtFiles.wxs"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Link
          & $light -ext WixUIExtension `
            -o "build\${{ matrix.build_type }}\RBPO-Setup.msi" `
            "installer\Product.wixobj" "installer\QtFiles.wixobj"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: rbpo-app-${{ matrix.build_type }}-${{ matrix.arch }}
          path: |
            build/${{ matrix.build_type }}/rbpo-app.exe
            build/${{ matrix.build_type }}/rbpo-service.exe

      - name: Upload installer artifact
        if: matrix.arch == 'x64'
        uses: actions/upload-artifact@v4
        with:
          name: rbpo-setup-${{ matrix.build_type }}-${{ matrix.arch }}
          path: build/${{ matrix.build_type }}/RBPO-Setup.msi
