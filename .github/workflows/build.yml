name: Build

on:
  push:
    branches: [ main, master, zad-1, zad-2, zad-3, zad-4, zad-5, zad-6, zad-6-base ]
  pull_request:
    branches: [ main, master, zad-6-base ]

jobs:
  build:
    name: Build x64 (exe + MSI)
    runs-on: windows-latest

    env:
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.7.3 (msvc2019_64)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Install WiX Toolset v3
        run: choco install wixtoolset --no-progress -y

      - name: Locate VC++ Redist Merge Module
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files (x86)\Common Files\Merge Modules"
            "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC"
            "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Redist\MSVC"
            "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Redist\MSVC"
          )
          $msm = $null
          foreach ($p in $candidates) {
            if (Test-Path $p) {
              $msm = Get-ChildItem $p -Filter "Microsoft_VC143_CRT_x64.msm" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($msm) { break }
            }
          }
          if (-not $msm) { Write-Error "VC++ Redist merge module (Microsoft_VC143_CRT_x64.msm) not found"; exit 1 }
          Write-Host "Found MSM: $($msm.FullName)"
          "MSM_PATH=$($msm.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Deploy Qt runtime (windeployqt)
        shell: pwsh
        run: |
          $wdq = (Get-Command windeployqt.exe -ErrorAction SilentlyContinue).Source
          if (-not $wdq -and $env:QT_ROOT_DIR) {
            $wdq = Join-Path $env:QT_ROOT_DIR "bin\windeployqt.exe"
            if (-not (Test-Path $wdq)) { $wdq = $null }
          }
          if (-not $wdq) { Write-Error "windeployqt.exe not found"; exit 1 }
          Write-Host "Using windeployqt: $wdq"
          New-Item -ItemType Directory -Path "build\qt_deploy" -Force | Out-Null
          & $wdq --no-translations --no-system-d3d-compiler --no-opengl-sw `
            --dir "build\qt_deploy" `
            "build\${{ env.BUILD_TYPE }}\rbpo-app.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build MSI installer (WiX)
        shell: pwsh
        run: |
          function Find-Tool($name) {
            $cmd = (Get-Command $name -ErrorAction SilentlyContinue).Source
            if ($cmd) { return $cmd }
            $found = Get-ChildItem "C:\Program Files (x86)\WiX Toolset*\bin\$name" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { return $found.FullName }
            Write-Error "$name not found"; exit 1
          }
          $candle = Find-Tool "candle.exe"
          $light  = Find-Tool "light.exe"
          $heat   = Find-Tool "heat.exe"
          Write-Host "candle: $candle"
          Write-Host "light:  $light"
          Write-Host "heat:   $heat"

          # Harvest Qt deployed files into generated WXS
          & $heat dir "build\qt_deploy" -gg -scom -sreg -sfrag -srd `
            -cg QtDeployFiles -dr INSTALLFOLDER `
            -var var.QtDeployDir `
            -o "installer\QtFiles.wxs"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Compile WXS -> wixobj
          & $candle -arch x64 `
            -dSourceDir="build\${{ env.BUILD_TYPE }}" `
            -dVCRedistPath="$env:MSM_PATH" `
            -o "installer\Product.wixobj" "installer\Product.wxs"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          & $candle -arch x64 `
            -dQtDeployDir="build\qt_deploy" `
            -o "installer\QtFiles.wixobj" "installer\QtFiles.wxs"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          # Link wixobj -> MSI
          & $light -ext WixUIExtension `
            -o "build\${{ env.BUILD_TYPE }}\RBPO-Setup.msi" `
            "installer\Product.wixobj" "installer\QtFiles.wixobj"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rbpo-binaries-x64
          path: |
            build/${{ env.BUILD_TYPE }}/rbpo-app.exe
            build/${{ env.BUILD_TYPE }}/rbpo-service.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: rbpo-installer-x64
          path: build/${{ env.BUILD_TYPE }}/RBPO-Setup.msi
